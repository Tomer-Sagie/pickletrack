name: pickletrack
description: A free, offline-first pickleball game tracker for iOS & Android.
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.21.0
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  path_provider: ^2.1.0
  path: ^1.9.0
  intl: ^0.19.0
  share_plus: ^12.0.2
  audioplayers: ^6.6.0
  audioplayers_web: ^5.2.0
  sqlite3_flutter_libs: ^0.5.42

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.21.0
  build_runner: ^2.4.0
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
