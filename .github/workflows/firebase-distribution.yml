# Build and distribute the Android APK to Firebase App Distribution.
#
# Prerequisites:
#   1. Create a service account in Google Cloud Console
#   2. Give it "Firebase App Distribution Admin" role in Google Cloud IAM
#   3. ADD IT TO FIREBASE CONSOLE: Project Settings → Users and permissions → Add member
#      (paste the service account email, give "Firebase App Distribution Admin" role)
#   4. Enable "Firebase App Distribution API" in Google Cloud Console → APIs & Services
#   5. Download the service account JSON key
#   6. Add FIREBASE_SERVICE_ACCOUNT_JSON as a GitHub repository secret
#      (Settings → Secrets and variables → Actions → New repository secret)

name: Firebase App Distribution

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'Latest build from CI'

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Write release notes
        run: echo "${{ github.event.inputs.release_notes || 'Latest build from CI' }}" > release-notes.txt

      - name: Write service account credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SA_JSON" > ./google-credentials.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/google-credentials.json
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "1:420306123685:android:0134c4202db844c1eb064c" \
            --groups "qa-team" \
            --release-notes-file release-notes.txt
