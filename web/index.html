<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="PickleTrack — a free, offline-first pickleball score tracker. No ads, no accounts.">

  <!-- PWA: iOS standalone mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PickleTrack">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- PWA: Android / general -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#C8E030">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>PickleTrack</title>
  <link rel="manifest" href="manifest.json">

  <!-- PWA: Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(err) {
        console.log('Service worker registration failed:', err);
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
